# Un solo servicio: API .NET + frontend React (Dockerfile en la raíz)
services:
  - type: web
    name: rutasegura
    env: docker
    dockerfilePath: ./Dockerfile
    plan: free
    rootDir: .
    healthCheckPath: /swagger
    envVars:
      - key: ASPNETCORE_ENVIRONMENT
        value: Production
      - key: ASPNETCORE_URLS
        value: http://0.0.0.0:$PORT
      - key: RENDER
        value: "true"
      - key: ConnectionStrings__DefaultConnection
        value: Data Source=/var/data/rutasegura.db
      - key: Jwt__Issuer
        value: RutaSegura.API
      - key: Jwt__Audience
        value: RutaSegura.Client
      - key: Jwt__Key
        generateValue: true
      - key: FRONTEND_URL
        value: https://rutasegura-ubg3.onrender.com
      # Configura en el dashboard de Render (no subas la clave al repo):
      - key: VITE_GOOGLE_MAPS_API_KEY
        sync: false
      - key: Redis__ConnectionString
        sync: false
      # Opcional si solo pones host:puerto (Redis Cloud): contraseña en Redis__Password
      - key: Redis__Password
        sync: false
      # SafeBot: Groq en Render (LLM nube). Sin key → modo datos.
      - key: Groq__ApiKey
        sync: false
      - key: Groq__Model
        value: llama-3.1-8b-instant
      - key: Groq__Enabled
        value: "true"
      - key: Ollama__Enabled
        value: "false"
