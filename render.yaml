services:
  - type: web
    name: rutasegura-api
    runtime: dotnet
    plan: free
    rootDir: .
    buildCommand: dotnet publish backend/RutaSegura.csproj -c Release -o out
    startCommand: dotnet out/RutaSegura.dll
    healthCheckPath: /swagger
    envVars:
      - key: ASPNETCORE_ENVIRONMENT
        value: Production
      - key: ASPNETCORE_URLS
        value: http://0.0.0.0:$PORT
      - key: ConnectionStrings__DefaultConnection
        value: Data Source=/tmp/rutasegura.db
      - key: Jwt__Issuer
        value: RutaSegura.API
      - key: Jwt__Audience
        value: RutaSegura.Client
      - key: Jwt__Key
        generateValue: true
      - key: Redis__ConnectionString
        sync: false
      - key: FRONTEND_URL
        sync: false

  - type: web
    name: rutasegura-frontend
    runtime: node
    plan: free
    rootDir: .
    buildCommand: npm ci && npm run build
    startCommand: npx serve -s dist -l $PORT
    envVars:
      - key: VITE_GOOGLE_MAPS_API_KEY
        sync: false
      - key: VITE_API_URL
        sync: false
